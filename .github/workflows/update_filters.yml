name: AdGuard Filters Auto Build

# 언제 스크립트를 실행할지 결정합니다.
on:
  schedule:
    # 매일 한국 시간 새벽 3시(UTC 기준 18:00)에 자동 실행
    - cron: '0 18 * * *'
  workflow_dispatch:
    # 깃허브 웹페이지에서 수동으로 [Run workflow] 버튼을 눌러 실행할 수 있게 해줍니다.

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 깃허브 저장소의 파일들을 불러옵니다.
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 파이썬 환경을 세팅합니다.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. 필요한 모듈(tldextract)을 설치합니다. (이게 핵심!)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install tldextract

      # 4. 필터 최적화 파이썬 스크립트를 실행합니다.
      - name: Run Filter Optimization Script
        run: python build_filters.py

      # 5. 새로 만들어진 필터 파일을 깃허브에 자동 커밋 & 푸시합니다.
      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add my_base_filter.txt my_1hosts_xtra_only.txt
          
          # 변경 사항이 있을 때만 커밋하도록 처리하여 에러를 방지합니다.
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update optimized AdGuard filters" && git push)
