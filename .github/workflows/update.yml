name: Update Filter (Fixed)

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch original filter
        run: |
          curl -L "https://raw.githubusercontent.com/hooray804/adguard-gallery-filter/main/filter.txt" -o source.txt

      - name: Process filter
        run: |
          grep -Ev '^(@@|.*#@#|.*\$badfilter)' source.txt > step1.txt
          sed 's/^[ \t]*//;s/[ \t]*$//' step1.txt | grep -v '^$' > step2.txt
          sort -u step2.txt > filter.txt

      - name: Commit & push if changed
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@users.noreply.github.com"

          # 파일 없으면 무조건 커밋
          if [ ! -f filter.txt ]; then
            git add filter.txt
            git commit -m "Initial filter"
            git push
            exit 0
          fi

          # 변경 확인
          if git diff --quiet filter.txt; then
            echo "No changes"
          else
            git add filter.txt
            git commit -m "Update filter"
            git push
          fi
