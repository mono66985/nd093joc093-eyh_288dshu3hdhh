name: Update Filter (Force Create)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch original filter
        run: |
          curl -L "https://raw.githubusercontent.com/hooray804/adguard-gallery-filter/main/filter.txt" -o source.txt

      - name: Process filter
        run: |
          grep -Ev '^(@@|.*#@#|.*\$badfilter)' source.txt > step1.txt
          sed 's/^[ \t]*//;s/[ \t]*$//' step1.txt | grep -v '^$' > step2.txt
          sort -u step2.txt > filter.txt

      - name: Debug (파일 확인)
        run: |
          ls -al
          echo "==== filter.txt preview ===="
          head -n 20 filter.txt

      - name: Commit & Push (강제)
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@users.noreply.github.com"

          git add filter.txt
          git commit -m "Force update filter" || echo "no changes"
          git push
