name: Update Filter

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate filter
        run: |
          curl -s https://raw.githubusercontent.com/hooray804/adguard-gallery-filter/main/filter.txt > source.txt

          # 헤더 생성
          echo "! Title: Custom AdGuard Filter (Auto Extract)" > filters/custom.txt
          echo "! Description: Removed incorrect blocking & whitelist rules" >> filters/custom.txt
          echo "! Version: $(date +'%Y.%m.%d')" >> filters/custom.txt
          echo "! TimeUpdated: $(date --iso-8601=seconds)" >> filters/custom.txt
          echo "! Expires: 1 days" >> filters/custom.txt
          echo "! Homepage: https://github.com/USER/REPO" >> filters/custom.txt
          echo "" >> filters/custom.txt

          awk '
          BEGIN { skip=0 }

          /^! *Incorrect blocking/ { skip=1; next }

          /^!/ {
              if (skip==1) skip=0
              next
          }

          skip==1 { next }

          /^@@/ { next }
          /#@#/ { next }
          /\$badfilter/ { next }

          NF == 0 { next }

          { print }
          ' source.txt >> filters/custom.txt

          if ! grep -q "[^![:space:]]" filters/custom.txt; then
            echo "! empty" >> filters/custom.txt
          fi

      - name: Commit & push
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@users.noreply.github.com"

          git add filters/custom.txt
          git diff --cached --quiet || git commit -m "auto update filter"
          git push
