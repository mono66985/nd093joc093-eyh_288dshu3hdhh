name: Update Filter (Optimized)

on:
  schedule:
    - cron: "0 */6 * * *"   # 6시간마다
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch original filter
        run: |
          curl -L "https://raw.githubusercontent.com/hooray804/adguard-gallery-filter/main/filter.txt" -o source.txt

      - name: Process filter (remove exceptions + optimize)
        run: |
          # 1. 예외 규칙 제거
          grep -Ev '^(@@|.*#@#|.*\$badfilter)' source.txt > step1.txt

          # 2. 빈 줄 제거 + 앞뒤 공백 제거
          sed 's/^[ \t]*//;s/[ \t]*$//' step1.txt | grep -v '^$' > step2.txt

          # 3. 중복 제거 (정렬 기반)
          sort -u step2.txt > filter.txt

      - name: Check for changes
        id: diff
        run: |
          if [ -f filter.txt ] && git diff --quiet filter.txt; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit & push if changed
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@users.noreply.github.com"
          git add filter.txt
          git commit -m "Auto update filter"
          git push
