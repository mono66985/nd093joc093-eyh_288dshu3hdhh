name: Update Filter

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Generate filter
        run: |
          set -e

          curl -f -s https://raw.githubusercontent.com/hooray804/adguard-gallery-filter/main/filter.txt > source.txt

          mkdir -p filters

          # ===== AdGuard 인식용 헤더 (중요) =====
          {
            echo "! Title: Custom AdGuard Filter (Optimized)"
            echo "! Description: Rule-based filtering (safe)"
            echo "! Version: $(date +'%Y.%m.%d')"
            echo "! TimeUpdated: $(date --iso-8601=seconds)"
            echo "! Expires: 1 days"
            echo "! Homepage: None"
            echo "!"
            echo ""
          } > filters/custom.txt

          # ===== 1차 필터링 =====
          awk '
          BEGIN { in_if=0 }

          /^!#if/ { in_if=1; print; next }
          /^!#endif/ { in_if=0; print; next }

          /^!/ { next }

          /^@@/ { next }
          /#@#/ { next }
          /\$badfilter/ { next }

          NF == 0 { next }

          { print }
          ' source.txt > filters/tmp1.txt

          # ===== 2차: 조건부 보호 + 중복 제거 =====
          awk '
          BEGIN { in_if=0 }

          /^!#if/ { in_if=1; print; next }
          /^!#endif/ { in_if=0; print; next }

          in_if==1 { print; next }

          !seen[$0]++ { print }
          ' filters/tmp1.txt >> filters/custom.txt

          rm -f filters/tmp1.txt

          # ===== 완전 빈 필터 방지 =====
          if ! grep -q "[^![:space:]]" filters/custom.txt; then
            echo "! empty" >> filters/custom.txt
          fi

      - name: Commit & push
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@users.noreply.github.com"

          git add filters/custom.txt

          if ! git diff --cached --quiet; then
            git commit -m "auto update filter (final)"
            git push
          fi
