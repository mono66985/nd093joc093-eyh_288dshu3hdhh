name: Update Filter

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Generate filter
        run: |
          set -e

          curl -f -s https://raw.githubusercontent.com/hooray804/adguard-gallery-filter/main/filter.txt > source.txt

          mkdir -p filters

          # 헤더 생성
          {
            echo "! Title: Custom AdGuard Filter (Optimized)"
            echo "! Description: Rule-based filtering (safe)"
            echo "! Version: $(date +'%Y.%m.%d')"
            echo "! TimeUpdated: $(date --iso-8601=seconds)"
            echo "! Expires: 1 days"
            echo "! Homepage: https://github.com/hooray804/adguard-gallery-filter"
            echo ""
          } > filters/custom.txt

          # 1차 필터링 (규칙 기준)
          awk '
          BEGIN { in_if=0 }

          # 조건부 시작
          /^!#if/ {
              in_if=1
              print
              next
          }

          # 조건부 종료
          /^!#endif/ {
              in_if=0
              print
              next
          }

          # 일반 주석 제거 (조건부 제외)
          /^!/ {
              next
          }

          # 화이트리스트 제거
          /^@@/ { next }
          /#@#/ { next }
          /\$badfilter/ { next }

          # 빈 줄 제거
          NF == 0 { next }

          # 나머지 유지 (여기서 #$# 포함됨)
          { print }

          ' source.txt > filters/tmp1.txt

          # 2차 처리: 조건부 보호 + 중복 제거
          awk '
          BEGIN { in_if=0 }

          /^!#if/ {
              in_if=1
              print
              next
          }

          /^!#endif/ {
              in_if=0
              print
              next
          }

          in_if==1 {
              print
              next
          }

          !seen[$0]++ {
              print
          }

          ' filters/tmp1.txt > filters/custom.txt

          rm -f filters/tmp1.txt

          # 빈 필터 방지
          if ! grep -q "[^![:space:]]" filters/custom.txt; then
            echo "! empty" >> filters/custom.txt
          fi

      - name: Commit & push
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@users.noreply.github.com"

          git add filters/custom.txt

          if ! git diff --cached --quiet; then
            git commit -m "auto update filter (rule-based)"
            git push
          fi
