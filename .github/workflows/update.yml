name: Update Filter

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Fetch upstream
        run: |
          set -e
          curl -f -s https://raw.githubusercontent.com/hooray804/adguard-gallery-filter/main/filter.txt > source.txt

      - name: Check upstream change (hash)
        id: check
        run: |
          NEW_HASH=$(sha256sum source.txt | awk '{print $1}')
          echo "new_hash=$NEW_HASH" >> $GITHUB_OUTPUT

          if [ -f .last_hash ]; then
            OLD_HASH=$(cat .last_hash)
          else
            OLD_HASH=""
          fi

          if [ "$NEW_HASH" = "$OLD_HASH" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Stop if no change
        if: steps.check.outputs.changed == 'false'
        run: |
          echo "No upstream changes. Skipping."
          exit 0

      - name: Generate filter
        if: steps.check.outputs.changed == 'true'
        run: |
          mkdir -p filters

          {
            echo "! Title: Custom AdGuard Filter (Optimized)"
            echo "! Description: Rule-based filtering (safe)"
            echo "! Version: $(date +'%Y.%m.%d')"
            echo "! TimeUpdated: $(date --iso-8601=seconds)"
            echo "! Expires: 1 days"
            echo "! Homepage: None"
            echo "!"
            echo ""
          } > filters/custom.txt

          awk '
          BEGIN { in_if=0 }

          /^!#if/ { in_if=1; print; next }
          /^!#endif/ { in_if=0; print; next }

          /^!/ { next }

          /^@@/ { next }
          /#@#/ { next }
          /\$badfilter/ { next }

          NF == 0 { next }

          { print }
          ' source.txt > filters/tmp1.txt

          awk '
          BEGIN { in_if=0 }

          /^!#if/ { in_if=1; print; next }
          /^!#endif/ { in_if=0; print; next }

          in_if==1 { print; next }

          !seen[$0]++ { print }
          ' filters/tmp1.txt >> filters/custom.txt

          rm -f filters/tmp1.txt

      - name: Save new hash
        if: steps.check.outputs.changed == 'true'
        run: |
          echo "${{ steps.check.outputs.new_hash }}" > .last_hash

      - name: Commit & push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@users.noreply.github.com"

          git add filters/custom.txt .last_hash

          if ! git diff --cached --quiet; then
            git commit -m "auto update filter (upstream changed)"
            git push
          fi
