name: Auto Update Ultimate Filter

on:
  schedule:
    # 한국 시간 기준 매일 새벽 4시 실행 (UTC 기준 19시)
    - cron: '0 19 * * *'
  workflow_dispatch: # GitHub 웹사이트에서 수동으로 '실행' 버튼을 누를 수 있게 해줍니다.

jobs:
  update-filter:
    runs-on: ubuntu-latest

    steps:
      # 1. 가상 서버에 내 레포지토리의 파일들을 복사해 옵니다.
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. 파이썬 환경을 세팅합니다.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. 파이썬 스크립트를 실행하여 필터를 병합합니다.
      - name: Run merge script
        run: python merge_filters.py

      # 4. 완성된 파일을 레포지토리에 저장(Commit)하고 반영(Push)합니다.
      - name: Commit and Push changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add my_optimized_filter.txt
          
          # 필터에 변경 사항이 있을 때만 커밋하도록 하여 불필요한 에러를 방지합니다.
          git diff --staged --quiet || git commit -m "Auto-update: Ultimate Custom Filter"
          git push
