name: Auto Update Ultimate Filter

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

# 이 환경 변수를 추가하면 경고가 사라집니다.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-filter:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      # 이하 기존 코드와 동일
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Run merge script
        run: python merge_filters.py
        
      - name: Commit and Push changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add my_optimized_filter.txt
          git diff --staged --quiet || git commit -m "Auto-update: Ultimate Custom Filter"
          git push
